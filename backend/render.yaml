services:
  - type: web
    name: DevForge AI-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Set these in the Render dashboard (never commit secrets):
      # - MONGODB_URI
      # - JWT_SECRET            (32+ random chars)
      # - GROQ_API_KEY          (from console.groq.com)
      # - FRONTEND_URL          (your Vercel URL, e.g. https://DevForge AI.vercel.app)
      # - ADMIN_EMAIL
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: DAILY_AI_REQUEST_LIMIT
        value: 20
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
